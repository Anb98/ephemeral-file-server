services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ephemeral-file-server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - BASE_URL=http://localhost:3000
      - UPLOAD_DIR=/tmp/ephemeral-uploads
    restart: unless-stopped
